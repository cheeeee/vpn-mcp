name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install
        run: |
          uv build
          uv venv test-env
          source test-env/bin/activate
          pip install dist/vpn_mcp-*.whl

      - name: Import test
        run: |
          source test-env/bin/activate
          python -c "from vpn_mcp.server import main; print('Server import OK')"
          python -c "from vpn_mcp.client import ControlPlaneClient; print('Client import OK')"
          python -c "from vpn_mcp.fingerprint import get_machine_fingerprint; print('Fingerprint:', get_machine_fingerprint()[:16])"
